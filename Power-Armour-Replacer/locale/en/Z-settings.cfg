[mod-setting-description]
#Armour
ShortcutTech=ON:\nRequirerd no reserch to be unlocked, (Makes all the shortcuts default to API)\n\nOFF:\nConverts the vailla unlocks to required PA&R eqevelent Tech tier to be unlocked, rather than vanilla. Which is obvisuly Disable by PA&R anyway.
Durability=[color=green]ArmourdurabilityOFF: Armour Durability OFF[/color]\n\n\n\n[color=yellow]ArmourDurabilityAll: This setting applies 1 value to all armours Use Yellow colured setting[/color]\n\n\n\n[color=red]ArmourDurabilitySolo: Armour Durability Individually[/color]
SingleArmourDurabilitySetting=Sets the same durability value to all Armours.
EquipmentMulti=Allows to set the Equipment amount that is used in recipes for next tiers. Applies to all Equipment of my mod.
#Vanilla
vanilla-filters=Enable/Disable filters.(Middle click in invetory)\nOn Hides Filters.\nOff Shows Filters.
OptionalTech6Texture=With the new Tech 6 texture ther was 2 versions i liked but one was better than the other but still not avfull so both where included but one are undere this setting.
HideRecipesFromPlayer=Checkmark ON shows recipes.\nCheckmark Off Hides recipes.
#SA or MechMod
MK10RecipeTech=Moves the [item=mech-armour] requirment to mk 10 tech & changes the recipe to use the MK10.

